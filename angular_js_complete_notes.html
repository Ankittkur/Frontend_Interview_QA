<style>

    --border: rgba(255,255,255,0.07);

    --accent4: #f7a656;
    --accent5: #f76c7c;
    --tag-bg: rgba(124,106,247,0.15);
    --tag-text: #a99df9;
    --code-bg: #0a0c11;
    --code-border: rgba(124,106,247,0.25);

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    line-height: 1.75;
    min-height: 100vh;
  }

  /* ── Header ── */
  .hero {
    background: linear-gradient(135deg, #0d0f14 0%, #151228 50%, #0d1420 100%);
    border-bottom: 1px solid var(--border2);
    padding: 3rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(124,106,247,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.03em; }
  .hero h1 span { color: var(--accent); }
  .hero p { color: var(--muted); margin-top: 0.5rem; font-size: 0.95rem; }
  .badge-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 1.2rem; }
  .badge {
    background: var(--tag-bg); color: var(--tag-text);
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: 20px; padding: 3px 12px; font-size: 12px; font-weight: 500;
  }

  /* ── Layout ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  .grid-main { display: grid; grid-template-columns: 240px 1fr; gap: 2rem; align-items: start; }

  /* ── Sidebar ── */
  .sidebar {
    position: sticky; top: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    max-height: 90vh;
    overflow-y: auto;

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1rem; }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 7px;
    cursor: pointer; color: var(--muted);
    font-size: 13px; transition: all 0.15s;
    text-decoration: none; margin-bottom: 2px;
  }
  .nav-item:hover, .nav-item.active { background: var(--surface2); color: var(--text); }
  .nav-item .num {
    background: var(--tag-bg); color: var(--accent);
    border-radius: 4px; padding: 1px 6px;
    font-size: 11px; font-weight: 600; min-width: 22px; text-align: center;
  }

  /* ── Search ── */
  .search-wrap { margin-bottom: 1.5rem; }
  .search-wrap input {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 12px;
    font-family: inherit; font-size: 13px;
    outline: none;

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* ── Progress ── */
  .progress-bar-wrap { margin-bottom: 1.5rem; }
  .progress-bar-wrap p { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .progress-track { background: var(--surface2); border-radius: 4px; height: 5px; }
  .progress-fill { height: 5px; border-radius: 4px; background: var(--accent); transition: width 0.3s; width: 0%; }

  /* ── Topic Cards ── */
  .topic {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 2rem;
    overflow: hidden;
    scroll-margin-top: 1.5rem;
  }
  .topic-header {
    display: flex; align-items: center; gap: 12px;
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .topic-header:hover { background: var(--surface2); }
  .topic-num {
    background: var(--tag-bg); color: var(--accent);
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: 8px; padding: 4px 10px;
    font-size: 13px; font-weight: 600;
    white-space: nowrap;

  .topic-title { font-size: 1rem; font-weight: 600; flex: 1; }
  .topic-tag {
    font-size: 11px; border-radius: 20px; padding: 2px 10px; font-weight: 500;

  .tag-js { background: rgba(247,166,86,0.15); color: #f7a656; }
  .tag-ang { background: rgba(245,88,136,0.15); color: #f75888; }
  .tag-css { background: rgba(79,195,247,0.15); color: #4fc3f7; }
  .tag-arch { background: rgba(86,217,160,0.15); color: #56d9a0; }
  .topic-chevron { color: var(--muted); font-size: 18px; transition: transform 0.2s; }
  .topic.open .topic-chevron { transform: rotate(180deg); }

  .topic-body { display: none; padding: 1.5rem; }
  .topic.open .topic-body { display: block; }

  /* ── Content within topics ── */
  .section { margin-bottom: 2rem; }
  .section:last-child { margin-bottom: 0; }
  .section h3 {
    font-size: 0.9rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--accent2);
    margin-bottom: 0.8rem; padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .section h4 {
    font-size: 0.93rem; font-weight: 600;
    color: var(--accent3); margin: 1.2rem 0 0.4rem;
  }
  .section p { color: #c0c8d8; margin-bottom: 0.7rem; font-size: 0.92rem; }
  .section ul, .section ol { padding-left: 1.4rem; color: #c0c8d8; font-size: 0.92rem; }
  .section li { margin-bottom: 0.35rem; }
  strong { color: var(--text); font-weight: 600; }

  pre {
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 1rem 1.2rem;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.65;
    margin: 0.8rem 0;

  code {
    background: rgba(124,106,247,0.12);
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: 4px; padding: 1px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em; color: #c4b8ff;

  pre code { background: none; border: none; padding: 0; color: #c8d0e0; }

  /* keyword colors in code */
  .kw { color: #9d8df5; }
  .fn { color: #56d9a0; }
  .str { color: #f7c656; }
  .cm { color: #5a6480; }
  .num { color: #f7a656; }
  .cls { color: #4fc3f7; }

  .callout {
    border-left: 3px solid var(--accent4);
    background: rgba(247,166,86,0.07);
    border-radius: 0 8px 8px 0;
    padding: 0.8rem 1rem;
    margin: 0.8rem 0;
    font-size: 0.9rem; color: #c0c8d8;

  .callout.info { border-color: var(--accent2); background: rgba(79,195,247,0.07); }
  .callout.success { border-color: var(--accent3); background: rgba(86,217,160,0.07); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 0.8rem 0; }
  .col-card {
    background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; padding: 1rem;

  .col-card h5 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
  .col-card h5.green { color: var(--accent3); }
  .col-card h5.red { color: var(--accent5); }
  .col-card h5.blue { color: var(--accent2); }
  .col-card h5.purple { color: var(--accent); }
  .col-card p, .col-card li { font-size: 0.85rem; color: var(--muted); }

  .read-check {
    display: flex; align-items: center; gap: 8px;
    margin-top: 1.5rem; padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .read-check label { font-size: 13px; color: var(--muted); cursor: pointer; }
  .read-check input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .grid-main { grid-template-columns: 1fr; }
    .sidebar { position: static; max-height: none; }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>

const topics = [
  {
    id: 1, tag: "js", tagLabel: "JavaScript",
    title: "Nested Object Problem-Solving",
    content: `
<div class="section">
  <h3>Core Concept</h3>
  <p>Nested objects are objects whose values are other objects. Mastering them means: safe access, deep cloning, deep merging, and traversal.</p>
</div>
<div class="section">
  <h4>Optional Chaining & Nullish Coalescing</h4>
  <pre><code><span class="kw">const</span> user = { address: { city: <span class="str">"Delhi"</span> } };

<span class="cm">// Safe deep access — no TypeError if any level is undefined</span>
<span class="kw">const</span> city = user?.address?.city ?? <span class="str">"Unknown"</span>;

<span class="cm">// Method call safety</span>
user?.getName?.();
</code></pre>
</div>
<div class="section">
  <h4>Deep Clone (structuredClone)</h4>
  <pre><code><span class="kw">const</span> original = { a: { b: { c: <span class="num">42</span> } } };
<span class="kw">const</span> clone = structuredClone(original); <span class="cm">// Native, handles Date/Map/Set</span>
clone.a.b.c = <span class="num">99</span>;
console.log(original.a.b.c); <span class="cm">// 42 — unaffected</span>

<span class="cm">// JSON approach (loses Date, undefined, functions)</span>
<span class="kw">const</span> jsonClone = JSON.parse(JSON.stringify(original));
</code></pre>
</div>
<div class="section">
  <h4>Deep Merge</h4>
  <pre><code><span class="kw">function</span> <span class="fn">deepMerge</span>(target, source) {
  <span class="kw">for</span> (<span class="kw">const</span> key <span class="kw">of</span> Object.keys(source)) {
    <span class="kw">if</span> (source[key] <span class="kw">instanceof</span> <span class="cls">Object</span> && !Array.isArray(source[key])) {
      target[key] = <span class="fn">deepMerge</span>(target[key] ?? {}, source[key]);
    } <span class="kw">else</span> {
      target[key] = source[key];
    }
  }
  <span class="kw">return</span> target;
}
</code></pre>
</div>
<div class="section">
  <h4>Flatten a Nested Object</h4>
  <pre><code><span class="kw">function</span> <span class="fn">flatten</span>(obj, prefix = <span class="str">''</span>) {
  <span class="kw">return</span> Object.keys(obj).reduce((acc, key) => {
    <span class="kw">const</span> fullKey = prefix ? <span class="str">\`\${prefix}.\${key}\`</span> : key;
    <span class="kw">if</span> (<span class="kw">typeof</span> obj[key] === <span class="str">'object'</span> && obj[key] !== <span class="kw">null</span>) {
      Object.assign(acc, <span class="fn">flatten</span>(obj[key], fullKey));
    } <span class="kw">else</span> {
      acc[fullKey] = obj[key];
    }
    <span class="kw">return</span> acc;
  }, {});
}
<span class="cm">// { "a.b.c": 42 }</span>
</code></pre>
</div>
<div class="section">
  <h4>Common Interview Questions</h4>
  <ul>
    <li>Access a value given a path string like <code>"user.address.city"</code></li>
    <li>Count total keys in deeply nested object</li>
    <li>Compare two nested objects for deep equality</li>
  </ul>
  <pre><code><span class="cm">// Dynamic path accessor</span>
<span class="kw">const</span> <span class="fn">getByPath</span> = (obj, path) =>
  path.split(<span class="str">'.'</span>).reduce((acc, key) => acc?.[key], obj);

<span class="fn">getByPath</span>(user, <span class="str">'address.city'</span>); <span class="cm">// "Delhi"</span>
</code></pre>
</div>
`
  },
  {
    id: 2, tag: "js", tagLabel: "JavaScript",
    title: "Event Delegation and Use Cases",
    content: `
<div class="section">
  <h3>What is Event Delegation?</h3>
  <p>Instead of attaching listeners to every child element, you attach <strong>one listener to a parent</strong> and use <code>event.target</code> to determine which child was clicked. Works because DOM events bubble up.</p>
</div>
<div class="section">
  <h4>Basic Pattern</h4>
  <pre><code><span class="cm">// ❌ Inefficient — N listeners for N items</span>
items.forEach(item => item.addEventListener(<span class="str">'click'</span>, handler));

<span class="cm">// ✅ Delegation — 1 listener handles all</span>
document.getElementById(<span class="str">'list'</span>)
  .addEventListener(<span class="str">'click'</span>, (e) => {
    <span class="kw">const</span> li = e.target.closest(<span class="str">'li'</span>); <span class="cm">// walk up to target element</span>
    <span class="kw">if</span> (!li) <span class="kw">return</span>;
    console.log(<span class="str">'Clicked:'</span>, li.dataset.id);
  });
</code></pre>
</div>
<div class="section">
  <h4>Real-World Use Cases</h4>
  <ul>
    <li><strong>Dynamic lists:</strong> Items added via JS after page load automatically work</li>
    <li><strong>Tables:</strong> Single listener on <code>&lt;table&gt;</code> handles all row/cell clicks</li>
    <li><strong>Infinite scroll feeds:</strong> No re-binding needed as new items load</li>
    <li><strong>Context menus:</strong> Right-click across entire document with one handler</li>
    <li><strong>Drag & Drop zones:</strong> One listener on the container</li>
  </ul>
</div>
<div class="section">
  <h4>stopPropagation vs preventDefault</h4>
  <div class="two-col">
    <div class="col-card"><h5 class="blue">stopPropagation()</h5><p>Stops the event from bubbling up the DOM tree</p></div>
    <div class="col-card"><h5 class="purple">preventDefault()</h5><p>Stops the browser's default action (form submit, link nav)</p></div>
  </div>
</div>
<div class="section">
  <h4>Angular Equivalent</h4>
  <pre><code><span class="cm">// Angular uses host listeners — same delegation concept</span>
@<span class="cls">HostListener</span>(<span class="str">'click'</span>, [<span class="str">'$event'</span>])
<span class="fn">onClick</span>(event: <span class="cls">MouseEvent</span>) {
  <span class="kw">const</span> target = event.target <span class="kw">as</span> <span class="cls">HTMLElement</span>;
  <span class="kw">if</span> (target.matches(<span class="str">'.btn'</span>)) { <span class="cm">/* handle */</span> }
}
</code></pre>
</div>
`
  },
  {
    id: 3, tag: "js", tagLabel: "JavaScript",
    title: "call, apply, bind — Real-Time Scenarios",
    content: `
<div class="section">
  <h3>Core Idea</h3>
  <p>All three let you <strong>explicitly set <code>this</code></strong> for a function call. They differ in how arguments are passed and when the function executes.</p>
  <div class="two-col">
    <div class="col-card"><h5 class="blue">call(ctx, a, b)</h5><p>Invokes immediately. Args passed individually.</p></div>
    <div class="col-card"><h5 class="green">apply(ctx, [a,b])</h5><p>Invokes immediately. Args passed as array.</p></div>
  </div>
  <div class="col-card" style="margin-top:1rem"><h5 class="purple">bind(ctx, a)</h5><p>Returns a new function with <code>this</code> locked. Invoke later.</p></div>
</div>
<div class="section">
  <h4>Syntax Comparison</h4>
  <pre><code><span class="kw">function</span> <span class="fn">greet</span>(greeting, punct) {
  <span class="kw">return</span> <span class="str">\`\${greeting}, \${this.name}\${punct}\`</span>;
}
<span class="kw">const</span> user = { name: <span class="str">"Arjun"</span> };

greet.<span class="fn">call</span>(user, <span class="str">"Hello"</span>, <span class="str">"!"</span>);        <span class="cm">// "Hello, Arjun!"</span>
greet.<span class="fn">apply</span>(user, [<span class="str">"Hello"</span>, <span class="str">"!"</span>]);     <span class="cm">// "Hello, Arjun!"</span>
<span class="kw">const</span> boundGreet = greet.<span class="fn">bind</span>(user);   <span class="cm">// returns function</span>
boundGreet(<span class="str">"Hey"</span>, <span class="str">"."</span>);               <span class="cm">// "Hey, Arjun."</span>
</code></pre>
</div>
<div class="section">
  <h4>Real Scenarios</h4>
  <h4>1. Borrowing array methods on array-like objects</h4>
  <pre><code><span class="kw">function</span> <span class="fn">logArgs</span>() {
  <span class="cm">// arguments is array-like, not an Array</span>
  <span class="kw">const</span> arr = Array.prototype.slice.<span class="fn">call</span>(arguments);
  console.log(arr.join(<span class="str">', '</span>));
}
<span class="fn">logArgs</span>(<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>); <span class="cm">// "1, 2, 3"</span>
</code></pre>
  <h4>2. apply — spreading args into Math functions</h4>
  <pre><code><span class="kw">const</span> nums = [<span class="num">3</span>, <span class="num">1</span>, <span class="num">7</span>, <span class="num">2</span>];
<span class="kw">const</span> max = Math.max.<span class="fn">apply</span>(<span class="kw">null</span>, nums); <span class="cm">// 7</span>
<span class="cm">// Modern: Math.max(...nums)</span>
</code></pre>
  <h4>3. bind — React-style event handlers / partial application</h4>
  <pre><code><span class="kw">class</span> <span class="cls">Timer</span> {
  constructor() { this.count = <span class="num">0</span>; }
  <span class="fn">tick</span>() { this.count++; console.log(this.count); }
  <span class="fn">start</span>() {
    <span class="cm">// Without bind, 'this' inside tick would be undefined</span>
    setInterval(this.tick.<span class="fn">bind</span>(<span class="kw">this</span>), <span class="num">1000</span>);
  }
}

<span class="cm">// Partial application with bind</span>
<span class="kw">const</span> <span class="fn">multiply</span> = (a, b) => a * b;
<span class="kw">const</span> double = multiply.<span class="fn">bind</span>(<span class="kw">null</span>, <span class="num">2</span>);
double(<span class="num">5</span>); <span class="cm">// 10</span>
</code></pre>
</div>
<div class="callout info">💡 Arrow functions ignore <code>call/apply/bind</code> — their <code>this</code> is lexically bound and cannot be changed.</div>
`
  },
  {
    id: 4, tag: "js", tagLabel: "JavaScript",
    title: "Prototype, Custom Functions & Polyfills",
    content: `
<div class="section">
  <h3>Prototype Chain</h3>
  <p>Every JS object has a <code>[[Prototype]]</code> link. When you access a property, JS walks the chain until it finds it or hits <code>null</code>.</p>
  <pre><code><span class="kw">function</span> <span class="cls">Animal</span>(name) { this.name = name; }
<span class="cls">Animal</span>.prototype.<span class="fn">speak</span> = <span class="kw">function</span>() {
  <span class="kw">return</span> <span class="str">\`\${this.name} makes a sound.\`</span>;
};

<span class="kw">const</span> dog = <span class="kw">new</span> <span class="cls">Animal</span>(<span class="str">'Rex'</span>);
dog.<span class="fn">speak</span>();          <span class="cm">// works via prototype</span>
dog.hasOwnProperty(<span class="str">'name'</span>);  <span class="cm">// true</span>
dog.hasOwnProperty(<span class="str">'speak'</span>); <span class="cm">// false — on prototype</span>
</code></pre>
</div>
<div class="section">
  <h4>Polyfill: Array.prototype.filter</h4>
  <pre><code><span class="cls">Array</span>.prototype.<span class="fn">myFilter</span> = <span class="kw">function</span>(callback) {
  <span class="kw">if</span> (<span class="kw">typeof</span> callback !== <span class="str">'function'</span>)
    <span class="kw">throw new</span> <span class="cls">TypeError</span>(<span class="str">'Callback must be a function'</span>);
  <span class="kw">const</span> result = [];
  <span class="kw">for</span> (<span class="kw">let</span> i = <span class="num">0</span>; i < this.length; i++) {
    <span class="kw">if</span> (i <span class="kw">in</span> this && callback(this[i], i, this)) {
      result.push(this[i]);
    }
  }

[<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>,<span class="num">4</span>].<span class="fn">myFilter</span>(x => x % <span class="num">2</span> === <span class="num">0</span>); <span class="cm">// [2, 4]</span>

<div class="section">

  <pre><code><span class="cls">Array</span>.prototype.<span class="fn">myReduce</span> = <span class="kw">function</span>(callback, initialValue) {
  <span class="kw">if</span> (!this.length && initialValue === undefined)
    <span class="kw">throw new</span> <span class="cls">TypeError</span>(<span class="str">'Reduce of empty array with no initial value'</span>);

  <span class="kw">let</span> accumulator, startIndex;
  <span class="kw">if</span> (initialValue !== undefined) {
    accumulator = initialValue; startIndex = <span class="num">0</span>;
  } <span class="kw">else</span> {

    <span class="kw">if</span> (i <span class="kw">in</span> this)
      accumulator = callback(accumulator, this[i], i, this);
  }
  <span class="kw">return</span> accumulator;
};

[<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>].<span class="fn">myReduce</span>((acc, v) => acc + v, <span class="num">0</span>); <span class="cm">// 6</span>

<div class="section">
  <h3>What is Microfrontend?</h3>
  <p>An architectural style where the frontend is decomposed into smaller, independently deployable applications — each owned by a different team. Inspired by microservices.</p>
</div>
<div class="section">
  <h4>Implementation Approaches</h4>
  <div class="two-col">
    <div class="col-card"><h5 class="blue">Module Federation (Webpack 5)</h5><p>Most popular. Remotes expose modules; the shell (host) loads them at runtime. Best for Angular.</p></div>
    <div class="col-card"><h5 class="green">Single-SPA</h5><p>Framework-agnostic orchestrator. Mounts/unmounts micro apps based on route.</p></div>
  </div>
</div>
<div class="section">
  <h4>Module Federation Config</h4>
  <pre><code><span class="cm">// shell/webpack.config.js (Host)</span>
<span class="kw">new</span> <span class="cls">ModuleFederationPlugin</span>({
  remotes: {
    mfe1: <span class="str">'mfe1@http://localhost:4201/remoteEntry.js'</span>,
  },
  shared: { <span class="str">'@angular/core'</span>: { singleton: <span class="kw">true</span> } }
});

<span class="cm">// mfe1/webpack.config.js (Remote)</span>
<span class="kw">new</span> <span class="cls">ModuleFederationPlugin</span>({
  name: <span class="str">'mfe1'</span>,
  exposes: {
    <span class="str">'./Module'</span>: <span class="str">'./src/app/mfe1/mfe1.module.ts'</span>
  },
  shared: { <span class="str">'@angular/core'</span>: { singleton: <span class="kw">true</span> } }
});
</code></pre>
</div>
<div class="section">
  <h4>Shared Module Pattern</h4>
  <pre><code><span class="cm">// shared-lib (npm package or local lib)</span>
@<span class="cls">NgModule</span>({
  exports: [<span class="cls">CommonModule</span>, <span class="cls">FormsModule</span>,
            <span class="cls">ButtonComponent</span>, <span class="cls">HeaderComponent</span>],
  declarations: [<span class="cls">ButtonComponent</span>, <span class="cls">HeaderComponent</span>]
})
<span class="kw">export class</span> <span class="cls">SharedModule</span> {}
</code></pre>
  <div class="callout info">In Angular 17+, prefer <strong>standalone components</strong> over SharedModule. Export arrays of standalone components instead.</div>
</div>
<div class="section">
  <h4>NgRx with Microfrontends</h4>

  <pre><code><span class="cm">// Shell registers root store</span>

<span class="cm">// MFE1 registers feature state lazily</span>

<span class="cls">EffectsModule</span>.<span class="fn">forFeature</span>([<span class="cls">ProductEffects</span>])

<span class="cm">// Cross-MFE communication via custom events</span>
window.dispatchEvent(
  <span class="kw">new</span> <span class="cls">CustomEvent</span>(<span class="str">'cart:updated'</span>, { detail: { count: <span class="num">3</span> } })
);
</code></pre>
</div>

  <span class="fn">distinctUntilChanged</span>(),
  <span class="fn">switchMap</span>(query => this.api.<span class="fn">search</span>(query))

files$.pipe(

);

<span class="cm">// concatMap — sequential (ordered requests)</span>
actions$.pipe(

<span class="cm">// exhaustMap — ignore new while busy (login button)</span>

<span class="fn">distinctUntilChanged</span>()       <span class="cm">// skip duplicate consecutive</span>

<div class="section">
  <h3>HTTP Interceptor</h3>
  <p>Interceptors sit in the HTTP pipeline and can modify requests and responses globally — perfect for auth tokens, logging, loading indicators, and error handling.</p>

<div class="section">
  <h4>Auth Token Interceptor</h4>
  <pre><code>@<span class="cls">Injectable</span>()
<span class="kw">export class</span> <span class="cls">AuthInterceptor</span> <span class="kw">implements</span> <span class="cls">HttpInterceptor</span> {
  <span class="kw">constructor</span>(<span class="kw">private</span> auth: <span class="cls">AuthService</span>) {}

  <span class="fn">intercept</span>(req: <span class="cls">HttpRequest</span>&lt;any&gt;, next: <span class="cls">HttpHandler</span>) {
    <span class="kw">const</span> token = this.auth.<span class="fn">getToken</span>();
    <span class="kw">const</span> authReq = token
      ? req.<span class="fn">clone</span>({ setHeaders: { Authorization: <span class="str">\`Bearer \${token}\`</span> } })
      : req;
    <span class="kw">return</span> next.<span class="fn">handle</span>(authReq);
  }
}

<span class="cm">// Register in AppModule providers (or provideHttpClient)</span>
{ provide: <span class="cls">HTTP_INTERCEPTORS</span>, useClass: <span class="cls">AuthInterceptor</span>, multi: <span class="kw">true</span> }
</code></pre>
</div>
<div class="section">
  <h4>Global Error Interceptor</h4>
  <pre><code>@<span class="cls">Injectable</span>()
<span class="kw">export class</span> <span class="cls">ErrorInterceptor</span> <span class="kw">implements</span> <span class="cls">HttpInterceptor</span> {
  <span class="kw">constructor</span>(<span class="kw">private</span> toast: <span class="cls">ToastService</span>, <span class="kw">private</span> router: <span class="cls">Router</span>) {}

  <span class="fn">intercept</span>(req: <span class="cls">HttpRequest</span>&lt;any&gt;, next: <span class="cls">HttpHandler</span>) {
    <span class="kw">return</span> next.<span class="fn">handle</span>(req).pipe(
      <span class="fn">catchError</span>((error: <span class="cls">HttpErrorResponse</span>) => {
        <span class="kw">switch</span> (error.status) {
          <span class="kw">case</span> <span class="num">401</span>: this.router.<span class="fn">navigate</span>([<span class="str">'/login'</span>]); <span class="kw">break</span>;

<div class="section">
  <h3>ViewEncapsulation</h3>
  <p>Controls how Angular scopes component styles.</p>
  <div class="two-col">
    <div class="col-card"><h5 class="blue">Emulated (default)</h5><p>Scoped via attribute selectors. Styles won't leak out or in. 99% use case.</p></div>
    <div class="col-card"><h5 class="purple">None</h5><p>Global styles. Useful for theming 3rd-party libs like PrimeNG, Material.</p></div>
  </div>
  <div class="col-card" style="margin-top:1rem"><h5 class="green">ShadowDom</h5><p>True browser Shadow DOM. Strongest isolation but harder to theme externally.</p></div>
  <pre><code>@<span class="cls">Component</span>({
  encapsulation: <span class="cls">ViewEncapsulation</span>.None   <span class="cm">// global styles</span>
  <span class="cm">// .Emulated (default) | .ShadowDom | .None</span>
})
</code></pre>
</div>
<div class="section">
  <h4>NgZone</h4>
  <p>Angular wraps async operations in Zone.js to trigger change detection. Use NgZone when integrating non-Angular code (D3, Google Maps, WebSockets).</p>
  <pre><code><span class="kw">constructor</span>(<span class="kw">private</span> zone: <span class="cls">NgZone</span>) {}

<span class="cm">// Run outside Angular — no change detection triggered</span>
this.zone.<span class="fn">runOutsideAngular</span>(() => {
  this.chart = <span class="kw">new</span> <span class="cls">Chart</span>(canvas, config); <span class="cm">// heavy 3rd-party</span>
  this.chart.on(<span class="str">'click'</span>, data => {
    <span class="cm">// Force change detection when needed</span>
    this.zone.<span class="fn">run</span>(() => this.selectedData = data);
  });
});
</code></pre>
</div>
<div class="section">
  <h4>defer (Angular 17+)</h4>
  <p>Declarative lazy loading of template sections. Improves LCP and INP scores significantly.</p>
  <pre><code><span class="cm">&lt;!-- Basic defer --&gt;</span>
@defer {
  &lt;heavy-chart-component /&gt;
} @placeholder {
  &lt;p&gt;Loading chart...&lt;/p&gt;
} @loading (minimum 500ms) {
  &lt;spinner /&gt;
} @error {
  &lt;p&gt;Failed to load&lt;/p&gt;
}

<span class="cm">&lt;!-- Defer triggers --&gt;</span>
@defer (on viewport)     { &lt;component /&gt; }  <span class="cm">&lt;!-- intersects viewport --&gt;</span>
@defer (on idle)         { &lt;component /&gt; }  <span class="cm">&lt;!-- browser idle --&gt;</span>

@<span class="cls">Pipe</span>({ name: <span class="str">'filterList'</span>, pure: <span class="kw">false</span> })
<span class="kw">export class</span> <span class="cls">FilterListPipe</span> <span class="kw">implements</span> <span class="cls">PipeTransform</span> {

<div class="section">
  <h3>Cold vs Hot Observables</h3>
  <div class="two-col">
    <div class="col-card">
      <h5 class="blue">Cold Observable</h5>
      <ul>
        <li>Producer created <em>inside</em> subscribe</li>
        <li>Each subscriber gets its own execution</li>
        <li>HTTP requests, timers, of(), from()</li>
        <li>Lazy — nothing happens until subscribed</li>
      </ul>
    </div>
    <div class="col-card">
      <h5 class="red">Hot Observable</h5>
      <ul>
        <li>Producer exists <em>outside</em> subscribe</li>
        <li>Subscribers share same execution</li>
        <li>DOM events, WebSocket, Subject, BehaviorSubject</li>
        <li>Values emitted even with no subscribers</li>
      </ul>
    </div>
  </div>
  <pre><code><span class="cm">// Cold — each subscriber gets separate HTTP call</span>
<span class="kw">const</span> cold$ = this.http.<span class="fn">get</span>(<span class="str">'/api/data'</span>);

<span class="cm">// Hot — make cold observable hot via share()</span>
<span class="kw">const</span> hot$ = cold$.pipe(<span class="fn">shareReplay</span>(<span class="num">1</span>)); <span class="cm">// cache + share</span>

<span class="cm">// Subject is inherently hot</span>
<span class="kw">const</span> subject = <span class="kw">new</span> <span class="cls">BehaviorSubject</span>(<span class="num">0</span>);
subject.next(<span class="num">1</span>); <span class="cm">// emits even before subscribe</span>
</code></pre>
</div>
<div class="section">
  <h4>Change Detection Strategies</h4>
  <div class="two-col">
    <div class="col-card">
      <h5 class="red">Default</h5>
      <p>Checks entire component tree on every event/async operation. Safe but slow for large apps.</p>
    </div>
    <div class="col-card">
      <h5 class="green">OnPush</h5>
      <p>Only checks when: @Input reference changes, async pipe emits, markForCheck() called, or event originates in component.</p>
    </div>
  </div>
  <pre><code>@<span class="cls">Component</span>({
  changeDetection: <span class="cls">ChangeDetectionStrategy</span>.OnPush
})
<span class="kw">export class</span> <span class="cls">ProductCardComponent</span> {
  @<span class="cls">Input</span>() product!: <span class="cls">Product</span>;

  <span class="kw">constructor</span>(<span class="kw">private</span> cdr: <span class="cls">ChangeDetectorRef</span>) {}

  <span class="fn">updateManually</span>() {
    this.cdr.<span class="fn">markForCheck</span>();   <span class="cm">// mark for next cycle</span>
    <span class="cm">// or:</span>
    this.cdr.<span class="fn">detectChanges</span>();   <span class="cm">// immediate check</span>
  }
}
</code></pre>
</div>
<div class="callout success">✅ Best Practice: Use OnPush + async pipe + immutable data for maximum performance.</div>

const tagColors = {
  js: 'tag-js',
  ang: 'tag-ang',
  css: 'tag-css',
  arch: 'tag-arch'
};

function buildNav() {
  const nav = document.getElementById('navList');
  nav.innerHTML = topics.map(t => `
    <a class="nav-item" href="#topic-${t.id}" onclick="scrollTo(${t.id})">
      <span class="num">${t.id}</span>
      <span style="flex:1;line-height:1.3;font-size:12px">${t.title}</span>
    </a>
  `).join('');
}

function buildTopics(list) {
  const main = document.getElementById('topicList');
  main.innerHTML = list.map(t => `
    <div class="topic" id="topic-${t.id}" data-id="${t.id}">
      <div class="topic-header" onclick="toggleTopic(${t.id})">
        <span class="topic-num">${String(t.id).padStart(2,'0')}</span>
        <span class="topic-title">${t.title}</span>
        <span class="topic-tag ${tagColors[t.tag]}">${t.tagLabel}</span>
        <span class="topic-chevron">⌄</span>
      </div>
      <div class="topic-body">
        ${t.content}
        <div class="read-check">
          <input type="checkbox" id="chk-${t.id}" onchange="markRead(${t.id}, this.checked)">
          <label for="chk-${t.id}">Mark as read</label>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleTopic(id) {
  const el = document.getElementById('topic-' + id);
  el.classList.toggle('open');
}

function scrollTo(id) {
  const el = document.getElementById('topic-' + id);
  if (el) {
    el.classList.add('open');
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

const readSet = new Set();
function markRead(id, checked) {
  if (checked) readSet.add(id); else readSet.delete(id);
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  const pct = (readSet.size / topics.length) * 100;
  fill.style.width = pct + '%';
  label.textContent = `${readSet.size} / ${topics.length} read`;
}

function filterTopics(query) {
  const q = query.toLowerCase();
  const nav = document.getElementById('navList');
  const items = nav.querySelectorAll('.nav-item');
  items.forEach((item, i) => {
    const t = topics[i];
    const match = t.title.toLowerCase().includes(q) || t.tagLabel.toLowerCase().includes(q);
    item.style.display = match ? '' : 'none';
  });
  const main = document.getElementById('topicList');
  main.querySelectorAll('.topic').forEach(el => {
    const id = +el.dataset.id;
    const t = topics.find(x => x.id === id);
    const match = !q || t.title.toLowerCase().includes(q) || t.tagLabel.toLowerCase().includes(q);
    el.style.display = match ? '' : 'none';
  });
}

buildNav();
buildTopics(topics);

// Keyboard shortcut — / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('topicSearch').focus();
  }
});
</script>
</body>
</html>
